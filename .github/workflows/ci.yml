name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_CACHE_DIR: /tmp/.uv-cache
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    name: Typecheck (mypy --strict)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - run: uv run mypy --strict src/tessera tests

  test:
    name: Test + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - name: Run unit + integration tests with coverage
        # `-m "not slow"` excludes the sentence-transformers integration suite
        # whose first run pulls ~90 MB of model weights. Those tests run on
        # developer machines and in the benchmark pipeline, not per-PR CI.
        run: |
          uv run pytest \
            -m "not slow" \
            --cov=tessera \
            --cov-branch \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80
      - name: Enforce critical-dir coverage (vault, retrieval, adapters, auth, migration)
        run: uv run python scripts/check_critical_coverage.py coverage.xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  no-telemetry:
    name: No-telemetry grep
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/no_telemetry_grep.sh

  no-outbound:
    # The adapter framework is the first code in src/tessera that speaks to
    # the network (Ollama, OpenAI, Cohere). Per docs/determinism-and-
    # observability.md §CI enforcement, the test suite must pass with all
    # non-loopback outbound traffic blocked — proving no transitive
    # dependency makes a hidden outbound call (telemetry, update check,
    # auto-download).
    #
    # Enforcement lives at the Python ``socket.socket.connect`` layer via
    # ``tests/conftest.py`` (gated by ``TESSERA_NO_OUTBOUND=1``). The
    # kernel-level alternative (iptables REJECT) fails on GitHub-hosted
    # runners: the runner agent's own connection to GitHub's control plane
    # gets blocked alongside the test traffic, leaving the job hung until
    # timeout. Socket-level enforcement isolates the test process without
    # disturbing the runner agent; the tradeoff is that a dependency using
    # raw ctypes syscalls would bypass it (none in our dep graph do).
    name: No-outbound network test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TESSERA_NO_OUTBOUND: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - name: Pre-warm tiktoken encoding cache
        # tiktoken downloads cl100k_base from openaipublic.blob.core.windows.net
        # on first use. Cache it now, before the socket guard engages at
        # pytest collection time, so the retrieval tests read from disk.
        run: uv run python -c "import tiktoken; tiktoken.get_encoding('cl100k_base')"
      - name: Run tests with outbound blocked (socket-layer guard)
        run: uv run pytest -m "not slow" --no-cov

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
