name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_CACHE_DIR: /tmp/.uv-cache
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    name: Typecheck (mypy --strict)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - run: uv run mypy --strict src/tessera tests

  test:
    name: Test + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - name: Run unit + integration tests with coverage
        # `-m "not slow"` excludes the sentence-transformers integration suite
        # whose first run pulls ~90 MB of model weights. Those tests run on
        # developer machines and in the benchmark pipeline, not per-PR CI.
        run: |
          uv run pytest \
            -m "not slow" \
            --cov=tessera \
            --cov-branch \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80
      - name: Enforce critical-dir coverage (vault, retrieval, adapters, auth, migration)
        run: uv run python scripts/check_critical_coverage.py coverage.xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  no-telemetry:
    name: No-telemetry grep
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/no_telemetry_grep.sh

  no-outbound:
    # The adapter framework is the first code in src/tessera that speaks to
    # the network (Ollama, OpenAI, Cohere). Per docs/determinism-and-
    # observability.md §CI enforcement, the full test suite must pass with
    # every outbound destination except loopback blocked — proving no hidden
    # telemetry is in any transitive dependency's import path. Dependencies
    # install before the firewall drops so uv can still reach PyPI.
    #
    # 25-minute timeout (vs 10–15 on the other jobs) is deliberate: the first
    # run after a lockfile change lands torch + sentence-transformers wheels
    # (~1 GB combined) into the runner's uv cache, and the venv copy stage is
    # I/O-bound even on a cache hit. Subsequent runs on the same lockfile
    # complete in ~3 min.
    name: No-outbound network test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - name: Block outbound except loopback
        run: |
          sudo iptables -A OUTPUT -o lo -j ACCEPT
          sudo iptables -A OUTPUT -d 127.0.0.0/8 -j ACCEPT
          sudo iptables -A OUTPUT -p udp --dport 53 -d 127.0.0.53 -j ACCEPT
          sudo iptables -A OUTPUT -j REJECT --reject-with icmp-port-unreachable
      - name: Run tests with outbound blocked
        run: uv run pytest -m "not slow" --no-cov

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
